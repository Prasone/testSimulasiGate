<!DOCTYPE html>
<html>

<head>

    <title>History Kendaraan</title>

    <link
        rel="stylesheet"
        href="/static/style.css"
    >

    <style>

        body {
            font-family: Arial;
            background: #f0f0f0;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #222;
            color: white;
            padding: 15px;
        }

        td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .vehicle-img {
            width: 250px;
            border-radius: 10px;
        }

        .plate-img {
            width: 180px;
            border-radius: 10px;
            border: 2px solid #ddd;
        }

        .status-in {
            color: green;
            font-weight: bold;
        }

        .status-out {
            color: red;
            font-weight: bold;
        }

        .back-btn {
            margin-top: 30px;
            text-align: center;
        }

        .back-btn button {
            padding: 12px 30px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background: #222;
            color: white;
            border-radius: 8px;
        }

    </style>

</head>

<body>

    <h1>History Kendaraan</h1>

    <div class="table-container">

        <table>

            <tr>

                <th>ID</th>
                <th>RFID</th>
                <th>Plat</th>
                <th>Foto Kendaraan</th>
                <th>Foto Plat</th>
                <th>Jam Masuk</th>
                <th>Jam Keluar</th>
                <th>Status</th>

            </tr>

            {% for row in data %}

            <tr>

                <td>{{ row[0] }}</td>

                <td>{{ row[1] }}</td>

                <td>
                    <b>{{ row[2] }}</b>
                </td>

                <!-- FOTO KENDARAAN -->
                <td>

                    <img
                        src="/captures/{{ row[3].split('/')[-1] }}"
                        class="vehicle-img"
                    >

                </td>

                <!-- FOTO PLAT -->
                <td>

                    <img
                        src="/plates/{{ row[4].split('/')[-1] }}"
                        class="plate-img"
                    >

                </td>

                <td>{{ row[5] }}</td>

                <td>

                    {% if row[6] %}
                        {{ row[6] }}
                    {% else %}
                        -
                    {% endif %}

                </td>

                <td>

                    {% if row[7] == 'IN' %}

                        <span class="status-in">
                            {{ row[7] }}
                        </span>

                    {% else %}

                        <span class="status-out">
                            {{ row[7] }}
                        </span>

                    {% endif %}

                </td>

            </tr>

            {% endfor %}

        </table>

    </div>

    <div class="back-btn">

        <a href="/">

            <button>
                Kembali
            </button>

        </a>

    </div>

</body>

</html>
